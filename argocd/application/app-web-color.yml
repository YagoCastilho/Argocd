apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: webcolor
  namespace: argocd
  labels:
    curso: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/YagoCastilho/web-page-deploy.git
    targetRevision: HEAD
    directory:
      recurse: true
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: webcolor
  info:
  - name: Projeto
    value: "curso de gitops"